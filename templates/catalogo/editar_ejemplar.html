{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
        
        <div class="bg-gradient-to-r from-slate-900 to-blue-900 p-6 border-b border-slate-700">
            <div class="flex items-center gap-4">
                <div class="bg-blue-500/20 p-3 rounded-lg">
                    <i class="fas fa-edit text-blue-400 text-xl"></i>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-white">Editar Ejemplar</h3>
                    <p class="text-xs text-blue-300 font-mono tracking-wider">{{ ejemplar.codigo_inventario }}</p>
                </div>
            </div>
            <div class="mt-4 p-2 bg-black/20 rounded-lg border border-white/5">
                <p class="text-xs text-slate-400 uppercase font-bold px-1">Libro Asociado:</p>
                <p class="text-sm text-slate-200 px-1 font-semibold">{{ ejemplar.libro.titulo }}</p>
            </div>
        </div>
        
        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Código de Inventario</label>
                    <div class="relative">
                        <i class="fas fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" name="codigo" value="{{ ejemplar.codigo_inventario }}" 
                               class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 pl-12 text-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Estado del Ejemplar</label>
                    <div class="relative">
                        <i class="fas fa-info-circle absolute left-4 top-1/2 -translate-y-1/2 text-blue-500"></i>
                        <select name="estado" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 pl-12 text-white focus:ring-2 focus:ring-blue-500 outline-none appearance-none cursor-pointer">
                            <option value="DISPONIBLE" {% if ejemplar.estado == 'DISPONIBLE' %}selected{% endif %}>🟢 Disponible</option>
                            <option value="PRESTADO" {% if ejemplar.estado == 'PRESTADO' %}selected{% endif %}>🟡 Prestado</option>
                            <option value="MANTENIMIENTO" {% if ejemplar.estado == 'MANTENIMIENTO' %}selected{% endif %}>🔴 Dañado / Mantenimiento</option>
                            <option value="DONADO" {% if ejemplar.estado == 'DONADO' %}selected{% endif %}>🔵 Donado</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Ubicación Física (Estante)</label>
                <div class="relative">
                    <i class="fas fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-red-500"></i>
                    <select id="select-estante" name="ubicacion" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 pl-12 text-white font-bold focus:ring-2 focus:ring-red-500 outline-none appearance-none cursor-pointer">
                        <option value="">-- Seleccione Estante --</option>
                        {% for ubi in ubicaciones %}
                            <option value="{{ ubi.id }}" 
                                {% if ejemplar.ubicacion.id == ubi.id %}selected{% endif %}>
                                Estante: {{ ubi.estante }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <p class="mt-2 text-[10px] text-slate-500 italic px-1">Indique la posición exacta en los anaqueles de la biblioteca.</p>
            </div>

            <div class="flex flex-col md:flex-row gap-4 pt-6 border-t border-slate-700">
                <button type="submit" class="flex-[2] bg-blue-600 hover:bg-blue-500 text-white px-6 py-4 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 active:scale-95 uppercase text-sm tracking-widest">
                    <i class="fas fa-save"></i> Actualizar Ejemplar
                </button>
                
                <a href="{% url 'lista_ejemplares' ejemplar.libro.id %}" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 px-6 py-4 rounded-xl font-bold transition-all flex items-center justify-center uppercase text-xs tracking-wider">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
