{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-t-2xl shadow-2xl">
        <h2 class="text-2xl font-bold text-white flex items-center gap-3">
            <i class="fas fa-layer-group text-blue-500"></i>
            Registrar Ejemplar Físico
        </h2>
        <p class="text-slate-400 text-xs mt-1 uppercase tracking-widest font-semibold">
            Ingreso de nueva unidad al inventario
        </p>
    </div>

    <div class="bg-slate-800 border-x border-b border-slate-700 p-8 rounded-b-2xl shadow-2xl">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label class="block text-slate-400 text-xs font-bold uppercase ml-1">Libro / Obra Intelectual</label>
                <div class="relative [&>select]:w-full [&>select]:bg-slate-950 [&>select]:border-slate-700 [&>select]:rounded-xl [&>select]:p-3 [&>select]:pl-12 [&>select]:text-white [&>select]:appearance-none">
                    <i class="fas fa-book absolute left-4 top-1/2 -translate-y-1/2 text-blue-500 z-10"></i>
                    {{ form.libro }}
                </div>
            </div>

            <div class="space-y-2 pt-2">
                <label class="block text-slate-400 text-xs font-bold uppercase ml-1">Editorial</label>
                <div class="relative">
                    <i class="fas fa-building absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" 
                           name="editorial_manual" 
                           list="editoriales_list" 
                           required
                           placeholder="Buscar o registrar editorial..."
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 pl-12 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    
                    <datalist id="editoriales_list">
                        {% for ed in editoriales %}
                            <option value="{{ ed.nombre }}">
                        {% endfor %}
                    </datalist>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-slate-400 text-xs font-bold uppercase ml-1">Año de Publicación</label>
                    <div class="relative [&>input]:w-full [&>input]:bg-slate-900 [&>input]:border-slate-700 [&>input]:rounded-xl [&>input]:p-3 [&>input]:pl-12 [&>input]:text-white">
                        <i class="fas fa-calendar-alt absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 z-10"></i>
                        {{ form.anio_publicacion }}
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-slate-500 text-xs font-bold uppercase ml-1">Código Inventario</label>
                    <div class="relative [&>input]:w-full [&>input]:bg-slate-950 [&>input]:border-slate-800 [&>input]:rounded-xl [&>input]:p-3 [&>input]:pl-12 [&>input]:text-slate-600 [&>input]:pointer-events-none [&>input]:select-none">
                        <i class="fas fa-magic absolute left-4 top-1/2 -translate-y-1/2 text-slate-800 z-10"></i>
                        {{ form.codigo_inventario }}
                    </div>
                    <p class="text-[10px] text-blue-500 italic ml-1">
                        <i class="fas fa-info-circle"></i> Autogenerado al guardar.
                    </p>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 mt-8 pt-6 border-t border-slate-700">
                <button type="submit" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 uppercase text-sm">
                    Guardar Ejemplar
                </button>
                <a href="{% url 'gestion_libros' %}" class="flex-1 bg-slate-700 text-slate-300 py-4 rounded-xl font-bold text-center hover:bg-slate-600 transition-colors uppercase text-xs flex items-center justify-center">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    // Seleccionar libro desde la URL
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const libroId = urlParams.get('libro');
        if (libroId) {
            const selectLibro = document.querySelector('select[name="libro"]');
            if (selectLibro) {
                selectLibro.value = libroId;
                selectLibro.classList.add('pointer-events-none', 'select-none');
            }
        }
    });
</script>
{% endblock %}
